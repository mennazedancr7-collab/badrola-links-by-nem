        .link-card {

            background: rgba(255, 255, 255, 0.05);

            color: white;
            text-decoration: none;
            margin: 12px 0;
            padding: 16px;
            border-radius: 50px;
            border: 2px solid;
            animation: rgbColors 3s infinite linear;
            transition: 0.3s ease;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .link-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 25px white;
        }

        /* تصميم مشغل الموسيقى */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            width: 250px;
            animation: rgbColors 5s infinite linear;
        }

        #album-art {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
        }

        .track-info { flex-grow: 1; text-align: left; }
        .track-name { font-size: 0.8rem; font-weight: bold; color: white; margin: 0; }
        .artist-name { font-size: 0.65rem; color: #777; margin: 0; }

        .play-btn {
            background: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
